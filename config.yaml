# ============================================================
# AI Digest Agent — Master Configuration
# This file is self-evolving: Claude proposes changes via git
# ============================================================

agent:
  name: "AI Digest Agent"
  version: "1.0.0"
  timezone: "Asia/Kolkata"

schedule:
  daily_trends: "0 14 30 * * 1-6"   # 8:00 PM IST (14:30 UTC) Mon-Sat
  daily_news: "0 16 30 * * 1-6"     # 10:00 PM IST (16:30 UTC) Mon-Sat
  weekly_trends: "0 14 30 * * 0"    # 8:00 PM IST Sunday
  weekly_digest: "0 16 30 * * 0"    # 10:00 PM IST Sunday

ai:
  pass1:
    provider: "gemini"
    model: "gemini-2.5-flash-lite"
    temperature: 0.3
    max_tokens: 2048
  pass2:
    provider: "claude"
    model: "claude-sonnet-4-6-20250514"
    temperature: 0.4
    max_tokens: 4096

delivery:
  email:
    enabled: true
    provider: "resend"
    to: "${EMAIL_TO}"
    from: "${EMAIL_FROM}"
  telegram:
    enabled: true
    chat_id: "${TELEGRAM_CHAT_ID}"
  notion:
    enabled: true
    database_id: "${NOTION_DATABASE_ID}"
    daily_page_parent: "${NOTION_DAILY_PARENT_ID}"
    weekly_page_parent: "${NOTION_WEEKLY_PARENT_ID}"
  google_sheets:
    enabled: true
    spreadsheet_id: "${GOOGLE_SHEETS_ID}"
    daily_sheet: "daily_articles"
    weekly_sheet: "weekly_rollup"
  google_drive:
    enabled: true
    folder_id: "${GDRIVE_FOLDER_ID}"
  github_archive:
    enabled: true
    path: "data/archive"

# ============================================================
# TAXONOMY — Self-evolving. Claude updates this via git commits.
# Structure: main_topic > sub_topics > tool_types
# Each article gets 1 primary tag + N secondary tags
# ============================================================

taxonomy:
  content_creation:
    description: "Making things — text, visuals, audio, video"
    sub_topics:
      image_generation:
        tool_types: ["text-to-image", "image editing", "AI upscaling", "background removal"]
        examples: ["Midjourney", "NanoBanana", "Flux", "DALL-E", "Ideogram", "remove.bg", "Topaz", "Magnific"]
        related_to: ["design_tools", "media_image_utilities"]
      video_generation:
        tool_types: ["text-to-video", "video editing AI", "video enhancement", "deepfake & face swap"]
        examples: ["Veo 3", "Kling 3", "Runway", "Pika", "Hailuo", "HeyGen", "Synthesia"]
        related_to: ["media_video_utilities"]
      audio_music:
        tool_types: ["voice synthesis", "music generation", "audio editing", "transcription"]
        examples: ["ElevenLabs", "Suno", "Udio", "Lyria", "WhisperFlow", "Descript"]
        related_to: ["voice_agents", "media_audio_utilities", "meetings_comms"]
      writing_copy:
        tool_types: ["long-form writing", "copywriting & ads", "academic writing"]
        examples: ["Jasper", "Sudowrite", "Copy.ai", "Writesonic", "Paperpal"]
        related_to: ["marketing_seo"]
      three_d_spatial:
        tool_types: ["3D model generation", "AR/VR content"]
        examples: ["Meshy", "Luma Genie", "Tripo", "Kaedim"]
        related_to: []
      presentations_design:
        tool_types: ["slide generation", "design tools", "logo & branding"]
        examples: ["Gamma", "Canva AI", "Figma AI", "Framer", "Beautiful.ai", "Looka"]
        related_to: ["productivity_pm", "vibe_coding"]

  development_engineering:
    description: "Building things — code, infra, models"
    sub_topics:
      coding_assistants:
        tool_types: ["IDE-integrated", "code review", "code generation CLI"]
        examples: ["Claude Code", "Codex", "Cursor", "GitHub Copilot", "Windsurf", "CodeRabbit", "Aider"]
        related_to: ["ai_assistants"]
      vibe_coding:
        tool_types: ["no-code AI builders", "website builders", "mobile app builders"]
        examples: ["Lovable", "Bolt", "v0", "Replit Agent", "Emergent", "FlutterFlow"]
        related_to: ["presentations_design"]
      devops_cloud:
        tool_types: ["deployment platforms", "CI/CD AI", "monitoring & observability"]
        examples: ["Vercel", "Railway", "Modal", "Fly.io", "Render", "Datadog AI"]
        related_to: ["workflow_automation"]
      databases_vector:
