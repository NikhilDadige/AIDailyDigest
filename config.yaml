# ============================================================
# DATA SOURCES — RSS feeds, APIs, and scraping targets
# ============================================================

sources:
  rss_feeds:
    - name: "TechCrunch AI"
      url: "https://techcrunch.com/tag/artificial-intelligence/feed/"
      category_hint: "general"
    - name: "The Verge AI"
      url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
      category_hint: "general"
    - name: "Ars Technica AI"
      url: "https://feeds.arstechnica.com/arstechnica/technology-lab"
      category_hint: "general"
    - name: "VentureBeat AI"
      url: "https://venturebeat.com/category/ai/feed/"
      category_hint: "general"
    - name: "MIT Tech Review AI"
      url: "https://www.technologyreview.com/feed/"
      category_hint: "research"
    - name: "ArXiv CS.AI"
      url: "https://rss.arxiv.org/rss/cs.AI"
      category_hint: "research"
    - name: "ArXiv CS.LG"
      url: "https://rss.arxiv.org/rss/cs.LG"
      category_hint: "research"
    - name: "OpenAI Blog"
      url: "https://openai.com/blog/rss/"
      category_hint: "foundation_models"
    - name: "Anthropic Blog"
      url: "https://www.anthropic.com/blog/rss"
      category_hint: "foundation_models"
    - name: "Google AI Blog"
      url: "https://blog.google/technology/ai/rss/"
      category_hint: "foundation_models"
    - name: "Hugging Face Blog"
      url: "https://huggingface.co/blog/feed.xml"
      category_hint: "open_source_models"
    - name: "The Batch (Andrew Ng)"
      url: "https://www.deeplearning.ai/the-batch/feed/"
      category_hint: "general"

  apis:
    hacker_news:
      enabled: true
      endpoint: "https://hacker-news.firebaseio.com/v0"
      filter_keywords: ["AI", "LLM", "GPT", "Claude", "Gemini", "machine learning", "neural", "transformer", "diffusion", "agent"]
      max_stories: 15
    product_hunt:
      enabled: true
      filter_topics: ["artificial-intelligence", "machine-learning", "developer-tools"]
      max_products: 10
    github_trending:
      enabled: true
      languages: ["python", "typescript", "rust"]
      filter_keywords: ["llm", "ai", "agent", "diffusion", "transformer", "gpt", "claude"]
      max_repos: 10

# ============================================================
# OUTPUT SETTINGS
# ============================================================

output:
  daily_trends:
    max_articles: 25
    top_picks: 5
    include_taxonomy_check: true
  daily_news:
    max_articles: 30
    group_by: "primary_tag"
    chronological: true
  weekly_trends:
    aggregate_from: "stored_data"
    include_leaderboard: true
    include_heatmap: true
    include_week_over_week: true
  weekly_digest:
    aggregate_from: "stored_data"
    top_stories: 5
    generate_pdf: true
    pdf_format: "notebooklm_optimized"
