name: Daily AI Digest

on:
  schedule:
    # 8:00 PM IST = 14:30 UTC (trends)
    - cron: '30 14 * * 1-6'
    # 10:00 PM IST = 16:30 UTC (news)
    - cron: '30 16 * * 1-6'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'trends'
        type: choice
        options:
          - trends
          - news

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt "16" ]; then
              echo "mode=trends" >> $GITHUB_OUTPUT
            else
              echo "mode=news" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DAILY_PARENT_ID: ${{ secrets.NOTION_DAILY_PARENT_ID }}
          NOTION_WEEKLY_PARENT_ID: ${{ secrets.NOTION_WEEKLY_PARENT_ID }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python main.py --mode ${{ steps.mode.outputs.mode }}

      - name: Commit taxonomy updates & archives
        run: |
          git config user.name "AI Digest Agent"
          git config user.email "agent@digest.bot"
          git add -A
          git diff --staged --quiet || git commit -m "digest: ${{ steps.mode.outputs.mode }} $(date -u +%Y-%m-%d)"
          git push
